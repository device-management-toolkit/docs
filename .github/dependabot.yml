version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    # codeql-action's sub-actions release in lockstep; one PR instead of four.
    groups:
      codeql-action:
        patterns:
          - 'github/codeql-action*'

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: daily

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: daily
    groups:
      python-packages:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"